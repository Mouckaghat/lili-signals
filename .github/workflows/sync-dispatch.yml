name: Sync World Cup Dispatch

# Captures off-pitch "World Cup Dispatch" candidate stories from GDELT (free, no
# key) into lib/dispatchCandidates.ts. Rules-only engine: reputable-domain
# allowlist + relevance/tone filter → routes each into 'published' (≥2 outlets,
# non-sensitive) or 'quarantine' (grey zone, held for human review). Never
# auto-publishes a sensitive/defamation-risk story. 4×/day is plenty — these are
# slow-moving human stories, not live scores.

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no file write or commit)'
        type: boolean
        default: false

jobs:
  sync:
    name: Capture Dispatch candidates → lib/dispatchCandidates.ts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Capture Dispatch candidates
        run: npx tsx scripts/sync-dispatch.ts
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated dispatchCandidates.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/dispatchCandidates.ts
          git diff --cached --quiet || git commit -m "chore: refresh world cup dispatch [skip ci]"
          bash scripts/git-push-retry.sh
