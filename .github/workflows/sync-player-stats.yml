name: Sync Player Stats

# Per-player, per-match statistics (goals, assists, saves, rating, shots, passes,
# tackles) from api-football /fixtures/players → lib/playerStatsData.ts. This file
# feeds three honest models: Pass Map per-player nodes (lib/passStructure.ts),
# Shots GK saves (lib/shotsModel.ts) and the Players tab impact (lib/playerImpact.ts).
# Player ratings/passes accumulate through a match, so this runs on the same tight
# cadence as Sync Live Match Stats during the tournament window. Requires the
# API_FOOTBALL_KEY secret.

on:
  schedule:
    # Group stage (June 11–30) and knockouts (July 1–19) — every 15 min.
    - cron: '*/30 * 11-30 6 *'
    - cron: '*/30 * 1-19 7 *'
    # Off-season keep-warm: daily 06:15 UTC.
    - cron: '15 6 * 1-5,8-12 *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync player stats → lib/playerStatsData.ts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Fetch & regenerate playerStatsData.ts
        run: npx tsx scripts/sync-player-stats.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated playerStatsData.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/playerStatsData.ts
          git diff --cached --quiet || git commit -m "chore: refresh player stats [skip ci]"
          bash scripts/git-push-retry.sh
