name: Sync Squads

# ─── When this runs ───────────────────────────────────────────────────────────
#
# Squad lists are static once announced, but late call-ups / injury replacements
# happen right up to kickoff. So: once a day, plus manual trigger.
# Source: Wikipedia "2026 FIFA World Cup squads" (no API key needed).

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview counts only, no file write or commit)'
        type: boolean
        default: false

jobs:
  sync:
    name: Build squad profiles → lib/playerProfilesData.ts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Build squad profiles
        run: npx tsx scripts/sync-squads.ts
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated playerProfilesData.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/playerProfilesData.ts
          git diff --cached --quiet || git commit -m "chore: refresh squad profiles"
          bash scripts/git-push-retry.sh
