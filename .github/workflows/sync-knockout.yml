name: Sync Knockout Bracket

# Refreshes lib/knockoutData.ts (Round of 32 → Final). The bracket seeds
# progressively — R32 once the groups finish, then each later round as winners
# are decided — so this keeps the bracket and pick-the-winner game current.
# Live scores still flow through the /api/fixture-results overlay at runtime;
# this bot owns the fixture list + a baked status snapshot.

on:
  schedule:
    # ── June (group stage closes, R32 seeds) — every 15 min ──
    - cron: '*/15 * 25-30 6 *'

    # ── July (knockouts run to the final) — every 15 min ──
    - cron: '*/15 * 1-19 7 *'

    # ── Rest of year: daily heartbeat ──
    - cron: '0 12 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no file write or commit)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync knockout bracket → lib/knockoutData.ts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Fetch & regenerate knockoutData.ts
        run: npx tsx scripts/sync-knockout.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated knockoutData.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/knockoutData.ts
          git diff --cached --quiet || git commit -m "chore: refresh knockout bracket [skip ci]"
          bash scripts/git-push-retry.sh
