name: Sync Fixture Results

# ─── When this runs ───────────────────────────────────────────────────────────
#
# During match windows (June 11 – July 19, 2026):
#   Every 10 minutes from 13:00–23:59 UTC — covers all kick-off windows globally
#
# Outside match windows / rest of year:
#   Once per hour — keeps the workflow active, catches late results
#
# Manual trigger available at any time from the GitHub Actions tab.

on:
  schedule:
    # ── June: Group Stage (June 11–30) ──
    - cron: '*/10 13-23 11-30 6 *'
    - cron: '0 0-12 11-30 6 *'

    # ── July: Knockouts (July 1–19) ──
    - cron: '*/10 13-23 1-19 7 *'
    - cron: '0 0-12 1-19 7 *'

    # ── Rest of year: hourly heartbeat ──
    - cron: '0 * * 1-5,8-12 *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no file write or commit)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync fixture results → lib/fixtureResultsData.ts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Fetch & regenerate fixtureResultsData.ts
        run: npx tsx scripts/sync-fixture-results.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          # API_FOOTBALL_LEAGUE_ID: ${{ secrets.API_FOOTBALL_LEAGUE_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated fixtureResultsData.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/fixtureResultsData.ts
          git diff --cached --quiet || git commit -m "chore: refresh fixture results"
          git push
