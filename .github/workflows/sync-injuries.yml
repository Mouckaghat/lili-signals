name: Sync Injury Data

# ─── When this runs ───────────────────────────────────────────────────────────
# During the tournament: every 4 hours (injuries don't change every 10 min)
# Outside tournament: daily at 06:00 UTC (pre-tournament squad news)
# Manual trigger available at any time.

on:
  schedule:
    # ── June: Group Stage (June 11–30) — every 4 h ──
    - cron: '0 */4 11-30 6 *'
    # ── July: Knockouts (July 1–19) — every 4 h ──
    - cron: '0 */4 1-19 7 *'
    # ── Rest of year: daily at 06:00 UTC ──
    - cron: '0 6 * 1-5,8-12 *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no file write or commit)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync injury data → lib/injuryData.ts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Fetch & regenerate injuryData.ts
        run: npx tsx scripts/sync-injuries.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated injuryData.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/injuryData.ts
          git diff --cached --quiet || git commit -m "chore: refresh injury data [skip ci]"
          bash scripts/git-push-retry.sh
