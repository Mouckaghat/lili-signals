name: Sync Lineups & Formations

# ─── When this runs ───────────────────────────────────────────────────────────
#
# Every 30 minutes during the tournament window.
# Lineup announcements typically happen:
#   - Predicted XI: 24–48h before kickoff (press conferences, press briefings)
#   - Confirmed XI: ~75 min before kickoff (official FIFA submission)
#
# Sources: SofaScore → Fotmob → baseline (lib/teamFormationsBaseline.ts).
# No API key required — all sources are publicly accessible web endpoints.
#
# Outside tournament: daily check at 06:00 UTC (keeps the workflow warm).

on:
  schedule:
    # ── June: Group Stage (June 11–30) — every 30 min ──
    - cron: '*/30 * 11-30 6 *'
    # ── July: Knockouts (July 1–19) — every 30 min ──
    - cron: '*/30 * 1-19 7 *'
    # ── Rest of year: daily at 06:00 UTC ──
    - cron: '0 6 * 1-5,8-12 *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no file write or commit)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync lineups → lib/lineupData.ts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Fetch & regenerate lineupData.ts
        run: npx tsx scripts/sync-lineups.ts
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated lineupData.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/lineupData.ts
          git diff --cached --quiet || git commit -m "chore: refresh lineup data [skip ci]"
          git push
