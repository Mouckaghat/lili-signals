name: Sync Standings Data

# ─── When this runs ───────────────────────────────────────────────────────────
#
# During the tournament (June 11 – July 19, 2026):
#   Every 4 hours — group standings change match by match, not minute by minute
#
# Outside tournament hours / rest of year:
#   Daily at 06:00 UTC — keeps the workflow active
#
# Manual trigger available at any time from the GitHub Actions tab.

on:
  schedule:
    # ── June: Group Stage (June 11–30) — every 4 h ──
    - cron: '0 */4 11-30 6 *'
    # ── July: Knockouts (July 1–19) — every 4 h ──
    - cron: '0 */4 1-19 7 *'
    # ── Rest of year: daily at 06:00 UTC ──
    - cron: '0 6 * 1-5,8-12 *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no file write or commit)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync standings → lib/standingsData.ts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --prefer-offline

      - name: Fetch & regenerate standingsData.ts
        run: npx tsx scripts/sync-standings.ts
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          # Override if WC 2026 uses a different league ID
          # API_FOOTBALL_LEAGUE_ID: ${{ secrets.API_FOOTBALL_LEAGUE_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit updated standingsData.ts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/standingsData.ts
          git diff --cached --quiet || git commit -m "chore: refresh standings data [skip ci]"
          git push
